services:
  app:
    build: .
    container_name: context-flow-app
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - ./chroma_db:/workspace/chroma_db 
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollamab